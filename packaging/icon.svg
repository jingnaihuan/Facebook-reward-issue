<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 社群互动发奖中台 App 图标母版：金色圆角砖 + 奖杯 + 青碧星。
       用于生成 macOS RewardHub.icns 与 Windows RewardHub.ico。
       画布留 ~9% 透明边距，贴合 macOS Dock 图标网格。 -->
  <defs>
    <linearGradient id="gold" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#d9a520"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 金色圆角砖 -->
  <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#gold)"/>
  <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#sheen)"/>
  <!-- 奖杯（0..32 坐标系放大居中：中心(16,15)→(512,512)，scale 24） -->
  <g transform="translate(512 512) scale(24) translate(-16 -15)">
    <path d="M9 6.8 C4.4 6.8 4.4 13 9.9 12.5" fill="none" stroke="#14100a" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M23 6.8 C27.6 6.8 27.6 13 22.1 12.5" fill="none" stroke="#14100a" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M9.2 5.4 L22.8 5.4 L22.2 10.2 A6.6 6 0 0 1 9.8 10.2 Z" fill="#14100a"/>
    <path d="M14.5 15.4 L17.5 15.4 L17 19 L15 19 Z" fill="#14100a"/>
    <rect x="9.8" y="19" width="12.4" height="2.7" rx="1.2" fill="#14100a"/>
    <rect x="11.7" y="21.5" width="8.6" height="3.6" rx="1.4" fill="#14100a"/>
    <path d="M16 5.9 L16.82 8.17 L19.23 8.25 L17.33 9.73 L18.0 12.05 L16 10.7 L14.0 12.05 L14.67 9.73 L12.77 8.25 L15.18 8.17 Z" fill="#2bb6a6"/>
  </g>
</svg>
