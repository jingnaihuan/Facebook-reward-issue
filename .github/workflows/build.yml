name: build

# 手动触发，或推送 v* tag 时触发（tag 会把 Windows 产物附到 Release）。
# 说明：Mac 包改由本地 `bash packaging/build_mac.sh` 构建（x86_64 通吃 Intel/Apple 芯片）。
# GitHub 免费的 Intel runner(macos-13) 正在退役、长期派不到机器，故 CI 只负责 Windows。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Release 步骤上传产物需要

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build .exe
        run: packaging\build_win.bat
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: RewardHub-win
          path: dist/RewardHub-win.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RewardHub-win.zip
